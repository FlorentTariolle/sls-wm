# DeepDash V5 + space/time factorized attention -- single-knob ablation
# over the V5 baseline (calibrated dim_weights).
# Only change vs v5.yaml: attention_pattern switched from 'full' to
# 'space_time_sst_t' (3 space + 1 causal time, repeated L/4 times, per
# Dreamer 4 arxiv 2509.24527 Sec 3.4). dim_weights inherit the baseline's
# calibrated values [1.02, 0.94, 0.83, 1.20].
# Transformer/BC/PPO checkpoint_dir isolated to preserve baseline artifacts.
# FSQ is re-used from the baseline (no retraining needed).

# Shared model architecture
model:
  vocab_size: 625
  embed_dim: 512
  n_heads: 8
  n_layers: 8  # must be divisible by 4 for attention_pattern=space_time_sst_t
  tokens_per_frame: 64
  context_frames: 4
  levels: [5, 5, 5, 5]
  dropout: 0.15
  adaln: true
  attention_pattern: space_time_sst_t

# FSQ-VAE training (unchanged; re-uses v5_baseline FSQ)
fsq:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 2048
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  k_shifts: 1
  seed: 42
  amp: true
  compile: true
  checkpoint_dir: checkpoints_v5_baseline

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.004
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.02, 0.94, 0.83, 1.20]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints_v5_spacetime

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints_v5_spacetime/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints_v5_spacetime

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints_v5_spacetime/transformer_best.pt
  pretrained: checkpoints_v5_spacetime/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints_v5_spacetime
