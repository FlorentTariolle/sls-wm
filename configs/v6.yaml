# DeepDash V6 (V4 baseline + K=6 context frames) -- single-variable change
# The ONLY difference vs configs/v4.yaml is context_frames: 4 -> 6.
# Motivation: direct address of V5's distribution-diffuseness diagnosis.
# More approach frames per obstacle give the policy more evidence to
# commit decisively at the critical frame (see project_v5_observations.md).
# Usage: config = load_config("configs/v6.yaml", parse_args())

# Shared model architecture (consumed by transformer, controller_bc, controller_ppo)
model:
  vocab_size: 1000
  embed_dim: 512
  n_heads: 8
  n_layers: 8
  tokens_per_frame: 64
  context_frames: 6
  levels: [8, 5, 5, 5]
  dropout: 0.15
  adaln: true

# FSQ-VAE training (unchanged, FSQ is frozen and reused from V4)
fsq:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 2048
  lr: 0.001
  alpha_slow: 0.1
  alpha_uniform: 0.01
  seed: 42
  amp: true
  compile: true
  checkpoint_dir: checkpoints

# Tokenization (run before transformer training)
tokenize:
  checkpoint: checkpoints/fsq_best.pt
  batch_size: 512
  shifts_v: [-4, -2, 0, 2, 4]

# Transformer world-model training
transformer:
  episodes_dir: data/death_episodes
  expert_episodes_dir: data/expert_episodes
  epochs: 200
  batch_size: 512
  lr: 0.004
  lr_min: 0.0005
  weight_decay: 0.01
  cpc_weight: 1.0
  token_noise: 0.05
  fsq_noise: 0.05
  label_smoothing: 0.1
  fsq_sigma: 0.9
  fsq_dim_weights: [1.30, 0.84, 0.97, 0.89]
  focal_gamma: 2.0
  death_oversample: 4
  steps_per_epoch: 500
  patience: 60
  seed: 42
  checkpoint_dir: checkpoints

# Controller -- behavioral cloning pretraining
controller_bc:
  expert_episodes_dir: data/expert_episodes
  transformer_checkpoint: checkpoints/transformer_best.pt
  epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  val_ratio: 0.1
  seed: 42
  checkpoint_dir: checkpoints

# Controller -- PPO fine-tuning
controller_ppo:
  transformer_checkpoint: checkpoints/transformer_best.pt
  pretrained: checkpoints/controller_bc_best.pt
  amp_dtype: bfloat16
  n_iterations: 50000
  n_episodes: 512
  lr: 0.0001
  gamma: 0.995
  lam: 0.95
  clip_eps: 0.2
  ppo_epochs: 4
  minibatch_size: 512
  entropy_coeff: 0.01
  critic_coeff: 0.5
  max_grad_norm: 0.5
  max_dream_steps: 45
  death_threshold: 0.5
  mlp_hidden: 512
  n_eval_episodes: 512
  eval_interval: 10
  seed: 42
  checkpoint_dir: checkpoints
